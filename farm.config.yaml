# =============================================================================
# farm.config.yaml  —  FarmOS digital-twin seed + real-hardware map
# -----------------------------------------------------------------------------
# This one file does two jobs:
#   1. SEED DATA for the FarmOS app (verticals, zones, assets, sensors, resources).
#   2. REAL HARDWARE MAP — every asset/sensor names an actual buyable product and
#      how it connects, so the same twin drives a live farm, not just a demo.
#
# HOW IT BECOMES REAL ("click of a finger"):
#   devices  ->  Home Assistant (hub)  ->  FarmOS agent via HA REST/WebSocket API
#   - Sensors publish over WiFi / LoRaWAN / I2C(ESP32) / Zigbee into Home Assistant.
#   - Actuators (relays, valves, doors, dosing pumps) are Home Assistant entities.
#   - A FarmOS tool like setActuator('coop1_door','open') just calls the HA service
#     for `ha_entity`. shedLoad() flips a real Shelly relay. Nothing is fictional.
#   For the hackathon: `simulated: true` makes the app generate readings; flip to
#   false + fill `ha_entity` to talk to the real device. Same code path.
# =============================================================================

farm:
  name: "Verdant Acres"            # rename to your brand
  area_acres: 100
  location:
    country: Malaysia
    lat: 3.1400                    # set to your real site; drives Open-Meteo getForecast()
    lon: 101.6900
    timezone: Asia/Kuala_Lumpur

integration:
  hub: "Home Assistant"            # primary: runs on a Raspberry Pi 5 / mini-PC on-site
  hub_api: "http://homeassistant.local:8123/api"   # FarmOS reads/writes here
  alt_hub: "ThingsBoard CE"        # for large LoRaWAN sensor fleets
  logic_engine: "Node-RED"         # local automations, backs the offline fallback
  timeseries: "InfluxDB + Grafana"
  message_bus: "MQTT (Mosquitto)"
  lorawan_gateway: "Dragino LPS8v2"        # LoRaWAN gateway for field sensors
  protocols: [WiFi, LoRaWAN, MQTT, I2C-ESP32, Zigbee, Modbus]
  simulated: true                  # hackathon = true (generate readings); farm = false

# ---------------------------------------------------------------------------
# SHARED LIFE-SUPPORT RESOURCES  (energy + water)  — protected before anything else
# ---------------------------------------------------------------------------
resources:
  energy:
    solar_array_kw: 30
    battery:
      product: "Victron / EG4 LiFePO4 bank (Cerbo GX + SmartShunt)"
      monitor: "Victron Cerbo GX"            # MQTT + native Home Assistant integration
      protocol: MQTT
      ha_entity: sensor.battery_soc
      capacity_kwh: 60
      soc_pct: 78                            # seed value
    inverter:
      product: "Victron MultiPlus-II"
      ha_entity: sensor.inverter_load_w
    backup:
      product: "Diesel genset + planned biogas generator"
      ha_entity: switch.generator
      criticality: important
  water:
    tanks:
      - id: tank-rain-1
        product: "Poly tank + Dragino LDDS75 ultrasonic level sensor (LoRaWAN)"
        protocol: LoRaWAN
        ha_entity: sensor.tank_rain_1_level
        capacity_l: 20000
        level_pct: 64
      - id: tank-well-1
        product: "Poly tank + Milesight EM500-UDL level sensor"
        ha_entity: sensor.tank_well_1_level
        capacity_l: 15000
        level_pct: 80
    well:
      product: "Borehole/tubewell + Grundfos SQFlex solar pump"
      ha_entity: switch.well_pump
      criticality: important
      status: idle
    potable_treatment:
      product: "Sediment + carbon + UV (e.g. Viqua UV)"
      ha_entity: binary_sensor.uv_ok

# ---------------------------------------------------------------------------
# VERTICALS  (modules).  criticality: life_support | important | discretionary
#   life_support  = never shed (animals/fish/incubation/cold chain)
#   important     = shed only in deep crisis
#   discretionary = shed first (comfort/convenience loads)
# ---------------------------------------------------------------------------
verticals:

  - id: poultry
    name: "Poultry"
    zones:
      - id: coop-1
        assets:
          - { id: coop1_door,     type: coop_door,   criticality: important,
              hardware: "ChickenGuard Premium / Run-Chicken auto door", protocol: WiFi, ha_entity: cover.coop1_door }
          - { id: coop1_fans,     type: fan,         criticality: life_support,
              hardware: "Shelly Pro relay + exhaust fans", protocol: WiFi, ha_entity: fan.coop1 }
          - { id: coop1_feeder,   type: feeder,      criticality: important,
              hardware: "Automatic treadle/auger feeder + Shelly relay", protocol: WiFi, ha_entity: switch.coop1_feeder }
          - { id: incubator_1,    type: incubator,   criticality: life_support,
              hardware: "Cabinet incubator w/ temp controller", protocol: WiFi, ha_entity: switch.incubator_1 }
        sensors:
          - { metric: temperature, unit: C,   product: "Ecowitt WN31 / Aqara Zigbee", protocol: Zigbee, ha_entity: sensor.coop1_temp }
          - { metric: humidity,    unit: "%", product: "Ecowitt WN31", protocol: Zigbee, ha_entity: sensor.coop1_humidity }
          - { metric: eggs_today,  unit: count, product: "Manual / vision counter", ha_entity: sensor.coop1_eggs }
      - id: brooder-1
        assets:
          - { id: brooder_heater, type: heat_lamp, criticality: life_support,
              hardware: "Brooder heat plate + Shelly relay", protocol: WiFi, ha_entity: switch.brooder_heater }
          - { id: coop1_light,    type: light,     criticality: discretionary,
              hardware: "Coop LED + Shelly dimmer", protocol: WiFi, ha_entity: light.coop1 }
        sensors:
          - { metric: temperature, unit: C,   product: "Aqara Zigbee", protocol: Zigbee, ha_entity: sensor.brooder1_temp }
          - { metric: ammonia,     unit: ppm, product: "MQ-137 (ESP32)", protocol: I2C-ESP32, ha_entity: sensor.coop1_ammonia }
          - { metric: co2,         unit: ppm, product: "Sensirion SCD41", protocol: I2C-ESP32, ha_entity: sensor.coop1_co2 }

  - id: aquaponics
    name: "Aquaponics"
    zones:
      - id: fishtank-1
        assets:
          - { id: aqua1_aerator,  type: aerator,      criticality: life_support,
              hardware: "Air pump + Shelly Plus 1 relay", protocol: WiFi, ha_entity: switch.aqua1_aerator }
          - { id: aqua1_circpump, type: pump,         criticality: life_support,
              hardware: "Circulation pump + Shelly relay", protocol: WiFi, ha_entity: switch.aqua1_pump }
          - { id: aqua1_feeder,   type: fish_feeder,  criticality: important,
              hardware: "Automatic pond fish feeder", protocol: WiFi, ha_entity: switch.aqua1_feeder }
        sensors:
          - { metric: dissolved_oxygen, unit: "mg/L", product: "Atlas Scientific EZO-DO probe (I2C via ESP32/ESPHome)", protocol: I2C-ESP32, ha_entity: sensor.aqua1_do }
          - { metric: ph,          unit: pH,   product: "Atlas Scientific EZO-pH probe", protocol: I2C-ESP32, ha_entity: sensor.aqua1_ph }
          - { metric: water_temp,  unit: C,    product: "DS18B20 probe", protocol: I2C-ESP32, ha_entity: sensor.aqua1_watertemp }
          - { metric: ammonia,     unit: ppm,  product: "Test-kit / ISE probe", ha_entity: sensor.aqua1_ammonia }
      - id: growbed-1
        assets:
          - { id: growbed_pump,     type: pump,       criticality: life_support,
              hardware: "Flood/drain pump + Shelly relay", protocol: WiFi, ha_entity: switch.growbed_pump }
          - { id: growbed_solenoid, type: water_valve, criticality: important,
              hardware: "Bell-siphon solenoid + Shelly", protocol: WiFi, ha_entity: switch.growbed_solenoid }
          - { id: growbed_led,      type: grow_light, criticality: discretionary,
              hardware: "LED grow bar + Shelly", protocol: WiFi, ha_entity: light.growbed1 }
        sensors:
          - { metric: water_level, unit: "%",   product: "eTape / ultrasonic level", protocol: I2C-ESP32, ha_entity: sensor.growbed1_level }
          - { metric: nitrate,     unit: ppm,   product: "Nitrate ISE probe", protocol: I2C-ESP32, ha_entity: sensor.growbed1_nitrate }
          - { metric: ec,          unit: "mS/cm", product: "Atlas EZO-EC", protocol: I2C-ESP32, ha_entity: sensor.growbed1_ec }

  - id: hydroponics
    name: "Hydroponics"
    zones:
      - id: greenhouse-1
        assets:
          - { id: hydro1_doser,   type: dosing_pump, criticality: important,
              hardware: "Atlas Scientific EZO-PMP / Kamoer dosing pumps (pH + nutrient)", protocol: I2C-ESP32, ha_entity: switch.hydro1_doser }
          - { id: hydro1_lights,  type: grow_light,  criticality: discretionary,
              hardware: "LED grow lights + Shelly relay", protocol: WiFi, ha_entity: light.hydro1 }
          - { id: hydro1_farmbot, type: robot,       criticality: discretionary,
              hardware: "FarmBot Genesis (open-source CNC farming robot)", protocol: HTTP-API, ha_entity: switch.farmbot }
        sensors:
          - { metric: ph,   unit: pH,     product: "Atlas Scientific EZO-pH / DFRobot Gravity pH", protocol: I2C-ESP32, ha_entity: sensor.hydro1_ph }
          - { metric: ec,   unit: "mS/cm", product: "Atlas Scientific EZO-EC / Bluelab", protocol: I2C-ESP32, ha_entity: sensor.hydro1_ec }
          - { metric: water_temp, unit: C, product: "DS18B20", protocol: I2C-ESP32, ha_entity: sensor.hydro1_watertemp }
      - id: greenhouse-2
        assets:
          - { id: hydro2_circpump, type: pump,        criticality: important,
              hardware: "NFT circulation pump + Shelly relay", protocol: WiFi, ha_entity: switch.hydro2_circpump }
          - { id: hydro2_exhaust,  type: fan,         criticality: discretionary,
              hardware: "Exhaust fan + Shelly", protocol: WiFi, ha_entity: fan.hydro2 }
          - { id: hydro2_co2,      type: dosing_pump, criticality: discretionary,
              hardware: "CO2 regulator solenoid + Shelly", protocol: WiFi, ha_entity: switch.hydro2_co2 }
        sensors:
          - { metric: humidity,   unit: "%", product: "SHT31", protocol: I2C-ESP32, ha_entity: sensor.hydro2_humidity }
          - { metric: co2,        unit: ppm, product: "Sensirion SCD41", protocol: I2C-ESP32, ha_entity: sensor.hydro2_co2 }
          - { metric: water_temp, unit: C,   product: "DS18B20", protocol: I2C-ESP32, ha_entity: sensor.hydro2_watertemp }

  - id: fruit_orchard
    name: "Fruit Orchard"
    zones:
      - id: orchard-block-a
        assets:
          - { id: orchard_valve_a, type: irrigation_valve, criticality: important,
              hardware: "OpenSprinkler + Netafim drip zones", protocol: WiFi, ha_entity: switch.orchard_valve_a }
          - { id: orchard_mower,   type: robot,             criticality: discretionary,
              hardware: "Husqvarna Automower (native Home Assistant integration)", protocol: WiFi, ha_entity: lawn_mower.orchard }
        sensors:
          - { metric: soil_moisture, unit: "%",  product: "SenseCAP S2105 / Dragino SE01-LB (LoRaWAN soil moisture+EC)", protocol: LoRaWAN, ha_entity: sensor.orchard_a_soil }
          - { metric: soil_ec,       unit: "mS/cm", product: "SenseCAP S2105", protocol: LoRaWAN, ha_entity: sensor.orchard_a_ec }
      - id: orchard-block-b
        assets:
          - { id: orchard_fertigation_b, type: fertigation_pump, criticality: important,
              hardware: "Kamoer dosing pump + Shelly relay", protocol: WiFi, ha_entity: switch.orchard_fertigation_b }
          - { id: orchard_bird_deterrent, type: deterrent, criticality: discretionary,
              hardware: "Solar bird scarer + Shelly", protocol: WiFi, ha_entity: switch.orchard_bird }
        sensors:
          - { metric: soil_moisture, unit: "%", product: "Dragino SE01-LB", protocol: LoRaWAN, ha_entity: sensor.orchard_b_soil }
          - { metric: canopy_temp,   unit: C, product: "IR canopy sensor", protocol: LoRaWAN, ha_entity: sensor.orchard_b_canopy }
          - { metric: leaf_wetness,  unit: "%", product: "Leaf wetness sensor", protocol: LoRaWAN, ha_entity: sensor.orchard_b_leaf }

  - id: lodging
    name: "Airbnb Lodging"
    zones:
      - id: cabin-1
        assets:
          - { id: cabin1_ac,      type: hvac,       criticality: discretionary,
              hardware: "Split AC + Sensibo / Shelly", protocol: WiFi, ha_entity: climate.cabin1 }
          - { id: cabin1_water_heater, type: water_heater, criticality: discretionary,
              hardware: "Solar water heater + Shelly relay backup", protocol: WiFi, ha_entity: switch.cabin1_heater }
        sensors:
          - { metric: occupancy, unit: bool, product: "Booking sync (Beds24)", ha_entity: binary_sensor.cabin1_occupied }
      - id: cabin-2
        assets:
          - { id: cabin2_ac,          type: hvac,         criticality: discretionary,
              hardware: "Split AC + Sensibo", protocol: WiFi, ha_entity: climate.cabin2 }
          - { id: cabin2_fridge,      type: cold_storage, criticality: important,
              hardware: "Guest minibar fridge + Shelly", protocol: WiFi, ha_entity: switch.cabin2_fridge }
          - { id: cabin2_lock,        type: smart_lock,   criticality: important,
              hardware: "Smart lock (Beds24 check-in)", protocol: Zigbee, ha_entity: lock.cabin2 }
        sensors:
          - { metric: temperature, unit: C,   product: "Aqara Zigbee", protocol: Zigbee, ha_entity: sensor.cabin2_temp }
          - { metric: humidity,    unit: "%", product: "Aqara Zigbee", protocol: Zigbee, ha_entity: sensor.cabin2_humidity }
          - { metric: occupancy,   unit: bool, product: "Booking sync (Beds24)", ha_entity: binary_sensor.cabin2_occupied }

  - id: restaurant
    name: "Restaurant"
    zones:
      - id: kitchen
        assets:
          - { id: cold_room_1,    type: cold_storage, criticality: life_support,
              hardware: "Walk-in chiller + Shelly EM (temp+power)", protocol: WiFi, ha_entity: sensor.cold_room_1_temp }
          - { id: blast_chiller,  type: cold_storage, criticality: important,
              hardware: "Blast chiller + Shelly relay", protocol: WiFi, ha_entity: switch.blast_chiller }
        sensors:
          - { metric: cold_room_temp, unit: C, product: "Ecowitt WN30 probe / Zigbee", protocol: Zigbee, ha_entity: sensor.cold_room_1_temp }
      - id: prep-line
        assets:
          - { id: walk_in_freezer, type: cold_storage, criticality: important,
              hardware: "Walk-in freezer + Shelly EM (temp+power)", protocol: WiFi, ha_entity: sensor.walk_in_freezer_temp }
          - { id: resto_exhaust_hood, type: fan,    criticality: discretionary,
              hardware: "Kitchen exhaust hood + Shelly", protocol: WiFi, ha_entity: fan.resto_hood }
          - { id: resto_dishwasher,   type: dishwasher, criticality: discretionary,
              hardware: "Commercial dishwasher + Shelly", protocol: WiFi, ha_entity: switch.resto_dishwasher }
        sensors:
          - { metric: freezer_temp, unit: C,  product: "Ecowitt WN30 probe", protocol: Zigbee, ha_entity: sensor.walk_in_freezer_temp }
          - { metric: power_kw,     unit: kW, product: "Shelly 3EM sub-meter", protocol: WiFi, ha_entity: sensor.kitchen_power }

  - id: petting_zoo
    name: "Petting Zoo"
    zones:
      - id: barn-1
        assets:
          - { id: barn1_water,    type: water_valve, criticality: important,
              hardware: "Auto waterer + Shelly relay", protocol: WiFi, ha_entity: switch.barn1_water }
        sensors:
          - { metric: temperature, unit: C, product: "Ecowitt WN31", protocol: Zigbee, ha_entity: sensor.barn1_temp }
      - id: paddock-1
        assets:
          - { id: zoo_feeder,      type: feeder, criticality: important,
              hardware: "Auto feeder + Shelly relay", protocol: WiFi, ha_entity: switch.zoo_feeder }
          - { id: zoo_misting_fan, type: fan,    criticality: discretionary,
              hardware: "Misting cooling fan + Shelly", protocol: WiFi, ha_entity: fan.zoo_misting }
          - { id: zoo_gate,        type: gate,   criticality: important,
              hardware: "Motorised paddock gate", protocol: WiFi, ha_entity: cover.zoo_gate }
        sensors:
          - { metric: temperature, unit: C,  product: "Ecowitt WN31", protocol: Zigbee, ha_entity: sensor.paddock1_temp }
          - { metric: humidity,    unit: "%", product: "Ecowitt WN31", protocol: Zigbee, ha_entity: sensor.paddock1_humidity }
          - { metric: water_level, unit: "%", product: "Ultrasonic trough level", protocol: LoRaWAN, ha_entity: sensor.paddock1_water }

  - id: palm_oil
    name: "Palm Oil"
    zones:
      - id: plantation-block-1
        assets:
          - { id: palm1_fertigation, type: fertigation_pump, criticality: important,
              hardware: "Kamoer dosing pump + Shelly relay", protocol: WiFi, ha_entity: switch.palm1_fertigation }
          - { id: palm1_valve, type: irrigation_valve, criticality: important,
              hardware: "OpenSprinkler + Netafim drip zone", protocol: WiFi, ha_entity: switch.palm1_valve }
        sensors:
          - { metric: soil_moisture, unit: "%", product: "Dragino SE01-LB (LoRaWAN soil moisture+EC)", protocol: LoRaWAN, ha_entity: sensor.palm1_soil }
          - { metric: soil_ec,       unit: "mS/cm", product: "Dragino SE01-LB", protocol: LoRaWAN, ha_entity: sensor.palm1_ec }
          - { metric: groundwater,   unit: m, product: "Dragino LWL02 well-level sensor", protocol: LoRaWAN, ha_entity: sensor.palm1_groundwater }
      - id: plantation-block-2
        assets:
          - { id: palm2_fertigation, type: fertigation_pump, criticality: important,
              hardware: "Kamoer dosing pump + Shelly relay", protocol: WiFi, ha_entity: switch.palm2_fertigation }
          - { id: palm2_valve, type: irrigation_valve, criticality: important,
              hardware: "OpenSprinkler + Netafim drip zone", protocol: WiFi, ha_entity: switch.palm2_valve }
        sensors:
          - { metric: soil_moisture, unit: "%", product: "Dragino SE01-LB", protocol: LoRaWAN, ha_entity: sensor.palm2_soil }
          - { metric: canopy_temp,   unit: C, product: "IR canopy temperature sensor", protocol: LoRaWAN, ha_entity: sensor.palm2_canopy }
      - id: plantation-block-3
        assets:
          - { id: palm3_valve, type: irrigation_valve, criticality: important,
              hardware: "OpenSprinkler + Netafim drip zone", protocol: WiFi, ha_entity: switch.palm3_valve }
          - { id: palm_ripeness_cam, type: camera, criticality: discretionary,
