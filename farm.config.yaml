  - id: recycling
    name: "Recycling & Resource Recovery"
    zones:
      - id: digester
        assets:
          - { id: biogas_digester, type: digester, criticality: important,
              hardware: "Biogas digester + Modbus gas/level sensors", protocol: Modbus, ha_entity: sensor.digester_ch4 }
