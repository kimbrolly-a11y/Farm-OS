          - { metric: tank_level,   unit: "%", product: "Ultrasonic leachate level", protocol: LoRaWAN, ha_entity: sensor.leachate_level }

  - id: beekeeping
    name: "Beekeeping"
    zones:
      - id: apiary-1
        assets: []
        sensors:
          - { metric: hive_weight, unit: kg, product: "BroodMinder hive scale + temp/humidity", protocol: BLE-LoRaWAN, ha_entity: sensor.hive1_weight }
