          - { metric: batch_moisture,  unit: "%", product: "In-line moisture probe", ha_entity: sensor.fd_moisture }
      - id: processing-kitchen
        assets:
          - { id: dehydrator_1,   type: dehydrator, criticality: discretionary,
              hardware: "Commercial tray dehydrator + Shelly relay", protocol: WiFi, ha_entity: switch.dehydrator_1 }
          - { id: vacuum_sealer,  type: machine,    criticality: discretionary,
              hardware: "Chamber vacuum sealer", protocol: WiFi, ha_entity: switch.vacuum_sealer }
          - { id: pulper_mill,    type: machine,    criticality: discretionary,
              hardware: "Fruit pulper / mill + VFD", protocol: WiFi, ha_entity: switch.pulper_mill }
          - { id: finished_goods_freezer, type: cold_storage, criticality: important,
              hardware: "Chest freezer + Shelly EM (temp+power)", protocol: WiFi, ha_entity: sensor.fg_freezer_temp }
        sensors:
          - { metric: temperature, unit: C,  product: "Ecowitt WN31", protocol: Zigbee, ha_entity: sensor.processing_room_temp }
          - { metric: humidity,    unit: "%", product: "Ecowitt WN31", protocol: Zigbee, ha_entity: sensor.processing_room_humidity }
          - { metric: power_kw,    unit: kW, product: "Shelly 3EM sub-meter", protocol: WiFi, ha_entity: sensor.processing_power }

# ---------------------------------------------------------------------------
# LOAD-SHEDDING LADDER  — the agent obeys this in an energy crisis.
#   Shed discretionary -> important (only if severe).  NEVER shed life_support.
# ---------------------------------------------------------------------------
load_shedding:
  shed_first:  [hydro1_lights, hydro1_farmbot, orchard_mower, cabin1_ac, cabin1_water_heater, farmbot,
                canning_conveyor, canning_labeler, dehydrator_1, vacuum_sealer, pulper_mill, palm_ripeness_cam,
                coop1_light, growbed_led, hydro2_exhaust, hydro2_co2, orchard_bird_deterrent,
                cabin2_ac, resto_exhaust_hood, resto_dishwasher, zoo_misting_fan, compost_mixer]
  shed_next:   [orchard_valve_a, blast_chiller, coop1_feeder,
                retort_1, can_seamer, freeze_dryer_1, fd_vacuum_pump, fd_condenser,
                palm1_fertigation, palm2_fertigation, palm1_valve, palm2_valve, palm3_valve,
                growbed_solenoid, hydro2_circpump, orchard_fertigation_b, cabin2_fridge,
                walk_in_freezer, zoo_feeder, zoo_gate, digester_blower, leachate_pump]
  never_shed:  [coop1_fans, incubator_1, aqua1_aerator, aqua1_pump, cold_room_1, well_pump,
                brooder_heater, growbed_pump]

# ---------------------------------------------------------------------------
# ALERT ROUTING  (Malaysia = WhatsApp first)
# ---------------------------------------------------------------------------
alerts:
  channels:
    - { type: whatsapp, product: "Twilio WhatsApp", target: "+60-owner-number" }
    - { type: dashboard }
  severity_to_channel:
    critical: [whatsapp, dashboard]
    warning:  [dashboard]
