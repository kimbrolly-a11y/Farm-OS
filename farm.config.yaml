              hardware: "Label applicator + Shelly relay", protocol: WiFi, ha_entity: switch.canning_labeler }
        sensors:
          - { metric: retort_temp,     unit: C,   product: "PT100 probe (Modbus)", protocol: Modbus, ha_entity: sensor.retort_1_temp }
          - { metric: retort_pressure, unit: kPa, product: "Pressure transducer", protocol: Modbus, ha_entity: sensor.retort_1_pressure }
          - { metric: throughput,      unit: "cans/hr", product: "Line counter", ha_entity: sensor.canning_throughput }
      - id: freeze-dryer
        assets:
          - { id: freeze_dryer_1, type: freeze_dryer, criticality: important,
              hardware: "Harvest Right / commercial lyophilizer + Shelly EM", protocol: WiFi, ha_entity: switch.freeze_dryer_1 }
          - { id: fd_vacuum_pump, type: pump,         criticality: important,
              hardware: "Vacuum pump + Shelly relay", protocol: WiFi, ha_entity: switch.fd_vacuum_pump }
