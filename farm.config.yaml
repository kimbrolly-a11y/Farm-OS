          - { metric: humidity,     unit: "%",    product: "BroodMinder-TH", protocol: BLE, ha_entity: sensor.hive2_humidity }
          - { metric: bee_activity, unit: "/min", product: "Hive entrance bee counter", protocol: BLE-LoRaWAN, ha_entity: sensor.hive2_activity }

  - id: food_processing
    name: "Canning & Food Processing"
    zones:
      - id: canning-line
        assets:
          - { id: retort_1,        type: retort,    criticality: important,
              hardware: "Steam retort / pressure canner + Shelly EM", protocol: WiFi, ha_entity: switch.retort_1 }
