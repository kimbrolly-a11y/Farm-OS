<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Off-grid eco-farm landscape at dawn: hills, solar panels, barn, palms and a wind turbine">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1c16"/>
      <stop offset="0.55" stop-color="#0b1512"/>
      <stop offset="1" stop-color="#0a0e0d"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd27a" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#f5a623" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37d67a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#37d67a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#e7f0ec">
    <circle cx="120" cy="60" r="1.3" opacity="0.5"/><circle cx="240" cy="40" r="1" opacity="0.35"/>
    <circle cx="360" cy="80" r="1.4" opacity="0.5"/><circle cx="520" cy="50" r="1" opacity="0.3"/>
    <circle cx="900" cy="70" r="1.2" opacity="0.45"/><circle cx="1040" cy="45" r="1" opacity="0.3"/>
    <circle cx="1140" cy="90" r="1.3" opacity="0.4"/><circle cx="80" cy="120" r="1" opacity="0.3"/>
    <circle cx="700" cy="40" r="1.1" opacity="0.35"/><circle cx="440" cy="110" r="1" opacity="0.25"/>
  </g>

  <!-- sun glow + disc -->
  <circle cx="820" cy="250" r="220" fill="url(#sun)"/>
  <circle cx="820" cy="250" r="44" fill="#ffd27a" opacity="0.92"/>

  <!-- far hills -->
  <path d="M0 270 Q 220 220 460 258 T 900 250 T 1200 268 V420 H0 Z" fill="#163526"/>
  <rect x="0" y="270" width="1200" height="150" fill="url(#hillGlow)"/>

  <!-- solar array (left) -->
  <g stroke="#0a0e0d" stroke-width="2">
    <g fill="#1c3d4d">
      <path d="M120 300 l70 -16 v22 l-70 16 Z"/>
      <path d="M210 288 l70 -16 v22 l-70 16 Z"/>
      <path d="M150 330 l70 -16 v22 l-70 16 Z"/>
      <path d="M240 318 l70 -16 v22 l-70 16 Z"/>
    </g>
    <g stroke="#37d67a" stroke-width="1" opacity="0.5">
      <path d="M137 292 l70 -16 M167 322 l70 -16"/>
    </g>
  </g>

  <!-- barn on the mid hill -->
  <g transform="translate(470 250)">
    <polygon points="0,10 34,-14 68,10" fill="#2a1614"/>
    <rect x="6" y="10" width="56" height="42" fill="#20130f"/>
    <rect x="28" y="26" width="12" height="26" fill="#0a0e0d"/>
    <rect x="12" y="18" width="10" height="8" fill="#0a0e0d"/>
    <rect x="46" y="18" width="10" height="8" fill="#0a0e0d"/>
  </g>

  <!-- little grazing flock -->
  <g fill="#cfd3d6" opacity="0.8">
    <circle cx="600" cy="286" r="3.5"/><circle cx="614" cy="290" r="3.5"/><circle cx="628" cy="285" r="3.5"/>
  </g>

  <!-- palms (right) -->
  <g stroke="#0f2a1c" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M980 300 q -5 -34 3 -58"/>
    <g stroke="#183a26" stroke-width="5">
      <path d="M983 244 q -22 -12 -40 -6"/><path d="M983 244 q 22 -12 40 -6"/>
      <path d="M983 244 q -14 -22 -26 -30"/><path d="M983 244 q 14 -22 26 -30"/>
      <path d="M983 244 q 0 -22 0 -34"/>
    </g>
  </g>
  <g stroke="#0f2a1c" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M1050 305 q -4 -26 2 -44"/>
    <g stroke="#183a26" stroke-width="4">
      <path d="M1052 262 q -18 -9 -30 -4"/><path d="M1052 262 q 18 -9 30 -4"/>
      <path d="M1052 262 q 0 -18 0 -26"/>
    </g>
  </g>

  <!-- wind turbine (far right) -->
  <g transform="translate(1130 210)" stroke="#3a4a44" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M0 0 V96"/>
    <g stroke="#8ba79d">
      <path d="M0 0 L0 -34"/><path d="M0 0 L30 17"/><path d="M0 0 L-30 17"/>
    </g>
    <circle cx="0" cy="0" r="3.5" fill="#8ba79d" stroke="none"/>
  </g>

  <!-- foreground hill -->
  <path d="M0 330 Q 300 300 640 336 T 1200 330 V420 H0 Z" fill="#0c1c13"/>
</svg>
