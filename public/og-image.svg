<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FarmOS — the autonomous operating system for a one-person farm company">
  <defs>
    <linearGradient id="ogsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1c16"/><stop offset="0.6" stop-color="#0b1512"/><stop offset="1" stop-color="#0a0e0d"/>
    </linearGradient>
    <radialGradient id="ogsun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd27a" stop-opacity="0.85"/><stop offset="0.4" stop-color="#f5a623" stop-opacity="0.2"/><stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogglow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#37d67a" stop-opacity="0.16"/><stop offset="1" stop-color="#37d67a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogsky)"/>
  <rect width="1200" height="630" fill="url(#ogglow)"/>
  <circle cx="960" cy="230" r="240" fill="url(#ogsun)"/>
  <circle cx="960" cy="230" r="40" fill="#ffd27a" opacity="0.9"/>

  <!-- landscape band -->
  <path d="M0 430 Q 260 385 560 425 T 1200 420 V630 H0 Z" fill="#163526"/>
  <path d="M0 500 Q 320 465 700 505 T 1200 495 V630 H0 Z" fill="#0c1c13"/>
  <!-- solar -->
  <g fill="#1c3d4d" stroke="#0a0e0d" stroke-width="2">
    <path d="M120 470 l64 -14 v20 l-64 14 Z"/><path d="M200 458 l64 -14 v20 l-64 14 Z"/>
  </g>
  <!-- barn -->
  <g transform="translate(350 420)"><polygon points="0,10 30,-12 60,10" fill="#2a1614"/><rect x="6" y="10" width="48" height="36" fill="#20130f"/><rect x="24" y="24" width="12" height="22" fill="#0a0e0d"/></g>
  <!-- palm -->
  <g stroke="#0f2a1c" stroke-width="5" stroke-linecap="round" fill="none"><path d="M1040 470 q -4 -30 3 -52"/><g stroke="#183a26" stroke-width="4"><path d="M1043 418 q -20 -10 -34 -5"/><path d="M1043 418 q 20 -10 34 -5"/><path d="M1043 418 q 0 -18 0 -28"/></g></g>
  <!-- turbine -->
  <g transform="translate(1140 360)" stroke="#3a4a44" stroke-width="4" fill="none" stroke-linecap="round"><path d="M0 0 V78"/><g stroke="#8ba79d"><path d="M0 0 L0 -28"/><path d="M0 0 L25 14"/><path d="M0 0 L-25 14"/></g></g>

  <!-- logo mark -->
  <g transform="translate(90 90) scale(1.15)">
    <rect width="64" height="64" rx="14" fill="#0e1512"/><rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#22322e"/>
    <path d="M18 46 C 18 27, 35 17, 49 17 C 49 34, 38 47, 20 47 Z" fill="#37d67a"/>
    <path d="M23 45 C 31 35, 40 26, 46 20" stroke="#0e1512" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <circle cx="45" cy="45" r="5.4" fill="#0e1512" stroke="#37d67a" stroke-width="2.6"/><circle cx="45" cy="45" r="1.7" fill="#37d67a"/>
  </g>
  <text x="180" y="140" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="58" font-weight="700" letter-spacing="-1" fill="#e7f0ec">Farm<tspan fill="#37d67a">OS</tspan></text>

  <text x="92" y="250" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="600" fill="#e7f0ec">The autonomous operating system</text>
  <text x="92" y="304" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="600" fill="#e7f0ec">for a <tspan fill="#37d67a">one-person farm company</tspan>.</text>
  <text x="92" y="352" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#8ba79d">An AI agent that runs an off-grid eco-farm — and keeps it alive through a blackout.</text>

  <!-- stat chips -->
  <g font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600">
    <g transform="translate(92 400)"><rect width="180" height="46" rx="23" fill="#111917" stroke="#22322e"/><text x="24" y="30" fill="#37d67a">18 verticals</text></g>
    <g transform="translate(288 400)"><rect width="210" height="46" rx="23" fill="#111917" stroke="#22322e"/><text x="24" y="30" fill="#e7f0ec">Autonomous AI</text></g>
    <g transform="translate(514 400)"><rect width="260" height="46" rx="23" fill="#111917" stroke="#22322e"/><text x="24" y="30" fill="#f5a623">Off-grid · offline-safe</text></g>
  </g>
</svg>
